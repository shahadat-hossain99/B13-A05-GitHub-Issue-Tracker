<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind + Daisy UI -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS STYLES -->

    <link rel="stylesheet" href="./styles/logIn.css" />
  </head>
  <body>
    <header class="bg-base-100 shadow-sm">
      <div class="navbar mx-auto w-11/12">
        <div class="flex-1">
          <div class="flex items-center gap-2 cursor-pointer">
            <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="" />
            <a class="text-2xl font-semibold"
              >GitHub <span class="hidden sm:inline">Issues Tracker</span>
            </a>
          </div>
        </div>
        <div class="flex gap-2">
         <div class="join">
            <div>
             <label class="input validator join-item">
              <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input class=" w-24 md:w-auto" type="text" placeholder="Search issues..."/>
        </label>
      </div>
      <button class="btn btn-primary join-item">Search</button>
    </div>
    <div class="dropdown dropdown-end hidden md:inline">
      <a href="./index.html" class="btn btn-primary btn-outline">
        <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log Out
      </a>
    </div>
  </div>
        </div>
      </div>
    </header>
  </body>
</html>
