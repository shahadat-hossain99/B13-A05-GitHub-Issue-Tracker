<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>

    <!-- Tailwind + Daisy UI -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS STYLES -->

    <link rel="stylesheet" href="./styles/logIn.css" />
  </head>

  <body class="flex justify-center items-center h-screen bg-[#F8FAFC]">
    <section>
      <fieldset
        class="fieldset bg-white shadow-lg border-base-300 rounded-box w-xs border p-4"
      >
        <div class="brand flex justify-center pt-8 pb-6">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h1 class="text-center font-semibold text-[#1F2937] text-2xl mb-1">
          GitHub Issues Tracker
        </h1>

        <p class="text-[#64748B] text-center mb-6">
          Sign in to manage your issues
        </p>

        <label class="label font-medium text-[#1F2937]">Username</label>
        <input
          maxlength="5"
          minlength="5"
          id="input-user"
          type="text"
          class="input outline-none"
          placeholder="Username"
        />

        <label class="label font-medium text-[#1F2937]">Password</label>
        <input
          maxlength="8"
          minlength="8"
          id="input-password"
          type="password"
          class="input outline-none"
          placeholder="Password"
        />

        <button
          id="signInBtn"
          class="btn btn-primary text-white mb-6 mt-4 rounded-md"
        >
          Sign In
        </button>

        <div class="flex items-center gap-3">
          <hr class="flex-1 border-gray-300" />
          <p class="text-center">or</p>
          <hr class="flex-1 border-gray-300" />
        </div>

        <p class="text-[#64748B] text-center mb-2">Demo Credentials:</p>
        <div
          class="bg-gray-50 rounded-md flex justify-center items-center py-6"
        >
          <p>
            <span class="text-neutral-800 font-semibold">Username:</span> admin
            <br />
            <span class="text-neutral-800 font-semibold">Password: </span
            >admin123
          </p>
        </div>
      </fieldset>
    </section>

    <!-- JavaScript Section -->

    <script src="./scripts/script.js"></script>
  </body>
</html>
